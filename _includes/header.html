<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/syntax.css">

  <!-- Preconnect for external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- FontAwesome (non-critical, loads after main styles) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" media="print" onload="this.media='all'" />

  <!-- Favicon -->
  <link rel="shortcut icon" href="/favicon.ico" type="image/ico">
  <link rel="shortcut icon" href="/favicon.png">

  <!-- SEO -->
  {% seo %}

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">

  <!-- Enhanced Social Media Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@jasonwillems">
  <meta name="twitter:creator" content="@jasonwillems">

  {% if page.url == '/' %}
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ site.url }}/photos/jason-july2015.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:image" content="{{ site.url }}/photos/jason-july2015.jpg">
  {% elsif page.layout == "post" %}
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="og:image" content="{{ site.url }}/photos/jason-july2015.jpg">
  <meta name="twitter:image" content="{{ site.url }}/photos/jason-july2015.jpg">
  {% else %}
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ site.url }}/photos/jason-july2015.jpg">
  <meta name="twitter:image" content="{{ site.url }}/photos/jason-july2015.jpg">
  {% endif %}

  <!-- Structured Data -->
  {% include structured-data.html %}

  <!-- Feed -->
  {% feed_meta %}

  <!-- JavaScript -->
  <script src="/assets/js/main.js" defer></script>

  <!-- Google Analytics -->
  {% include analytics.html %}
</head>

<body class="{% if page.url == '/' %}home{% elsif page.url contains '/aws-azure-migration-guide/' %}migration-guide{% else %}{{ page.layout | default: 'page' }}{% endif %}">
  <div class="page-container">
    <header class="site-header">
      <div class="container">
        <div class="header-content">
          <div class="site-logo">
            <a href="/" class="logo-link">Jason Willems</a>
          </div>

          <nav class="site-nav">
            <ul class="nav-links">
              <li><a href="/" id="homelink" class="nav-link">Home</a></li>
              <li><a href="/travel" id="travellink" class="nav-link">Travel</a></li>
              <li><a href="/talks" id="talkslink" class="nav-link">Media</a></li>
              <li><a href="/blog" id="bloglink" class="nav-link">Blog</a></li>
              <li><a href="/contact" id="contactlink" class="nav-link">Contact</a></li>
            </ul>
          </nav>

          <button class="mobile-menu-toggle" aria-label="Toggle menu">
            <span class="hamburger-icon"></span>
          </button>
        </div>
      </div>
    </header>
